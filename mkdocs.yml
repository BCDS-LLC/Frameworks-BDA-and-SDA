site_name: BC-DS Framework Papers
site_description: >
  The Business Decision Architecture (BDA v2.1) and
  Solo Decision Architecture (SDA v1.0) Frameworks by BC-DS
site_author: Business Consultants for Digital Solutions, LLC

repo_name: BCDS-LLC/Frameworks-BDA-and-SDA
repo_url: https://github.com/BCDS-LLC/Frameworks-BDA-and-SDA
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    primary: indigo
    accent: blue
  features:
    - navigation.tabs         # Moves top-level folders to a horizontal top menu
    - navigation.sections     # Groups the sidebar cleanly
    - navigation.top          # Adds a "Back to Top" button for long framework pages
    - search.suggest          # Auto-suggests results as practitioners type in the search bar
    - search.highlight        # Highlights the exact search term on the page

nav:
  - Home: index.md
  - "BDA Framework v2.1":
    - The Framework: BDA_Framework_v2.md
    - "Appendix B — OCA": BDA_v2_Appendix_B_OCA.md
    - "Appendix C — Decisiontect": BDA_Appendix_C_Decisiontect.md
  - "SDA Framework v1.0":
    - The Framework: SDA_Framework_v1_0.md

markdown_extensions:
  - attr_list
  - admonition                # Enables colored call-out boxes for important notes/warnings
  - pymdownx.details          # Enables collapsible sections (great for long definitions)
  - pymdownx.superfences      # Enhances code/JSON block rendering
